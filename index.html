<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c0f;
      --surface:   #13151a;
      --border:    #22262f;
      --muted:     #3a3f4d;
      --text:      #e8e6e1;
      --sub:       #7a7f8e;
      --accent:    #c8f04d;
      --accent-dk: #9bbf32;
      --danger:    #f05d5e;
      --radius:    14px;
      --mono: 'DM Mono', monospace;
      --serif: 'DM Serif Display', serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .45;
      pointer-events: none;
    }

    /* ── glowing blob ── */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,77,.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -60%) scale(1); opacity: 1; }
      50%       { transform: translate(-50%, -58%) scale(1.08); opacity: .7; }
    }

    /* ── layout ── */
    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px 40px;
      box-shadow: 0 0 0 1px rgba(200,240,77,.05), 0 40px 80px rgba(0,0,0,.6);
      animation: slide-up .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .logo-mark svg { display: block; }

    .logo-text {
      font-family: var(--serif);
      font-size: 1.3rem;
      letter-spacing: .01em;
      color: var(--text);
    }

    h1 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 6px;
      color: var(--text);
    }

    .subtitle {
      font-size: .78rem;
      color: var(--sub);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* ── form ── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      color: var(--muted);
      display: grid; place-items: center;
      pointer-events: none;
      transition: color .2s;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px 13px 42px;
      font-family: var(--mono);
      font-size: .9rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      caret-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,240,77,.12);
    }

    input:focus + .icon,
    .input-wrap:focus-within .icon { color: var(--accent); }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: grid; place-items: center;
      padding: 4px;
      border-radius: 4px;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* ── options row ── */
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 0 28px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: .8rem;
      color: var(--sub);
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      appearance: none;
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      padding: 0;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: border-color .2s, background .2s;
    }

    .checkbox-label input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-label input[type="checkbox"]:checked::after {
      content: '';
      display: block;
      width: 9px; height: 6px;
      border-left: 2px solid #0b0c0f;
      border-bottom: 2px solid #0b0c0f;
      transform: rotate(-45deg) translate(1px,-1px);
    }

    .forgot {
      font-size: .78rem;
      color: var(--sub);
      text-decoration: none;
      transition: color .2s;
    }
    .forgot:hover { color: var(--accent); }

    /* ── submit button ── */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .04em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .2s, transform .1s;
    }

    .btn:hover  { background: #d4f55e; }
    .btn:active { transform: scale(.985); }

    .btn .btn-text { transition: opacity .2s; }
    .btn .spinner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .btn.loading .btn-text { opacity: 0; }
    .btn.loading .spinner  { opacity: 1; }
    .btn:disabled { cursor: not-allowed; opacity: .7; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-ring {
      width: 18px; height: 18px;
      border: 2px solid rgba(11,12,15,.3);
      border-top-color: #0b0c0f;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── alerts ── */
    .alert {
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .82rem;
      line-height: 1.5;
      margin-bottom: 20px;
      display: none;
      align-items: flex-start;
      gap: 10px;
      animation: fade-in .25s ease;
    }

    @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

    .alert.show { display: flex; }

    .alert-error {
      background: rgba(240,93,94,.1);
      border: 1px solid rgba(240,93,94,.3);
      color: #f59e9f;
    }

    .alert-success {
      background: rgba(200,240,77,.08);
      border: 1px solid rgba(200,240,77,.25);
      color: var(--accent);
    }

    .alert svg { flex-shrink: 0; margin-top: 1px; }

    /* ── divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0;
      color: var(--muted);
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── register link ── */
    .register {
      text-align: center;
      font-size: .8rem;
      color: var(--sub);
    }
    .register a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .register a:hover { text-decoration: underline; }

    /* ── security badge ── */
    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .04em;
    }
    .security-note svg { color: var(--muted); }

    /* ── input error state ── */
    input.invalid { border-color: var(--danger) !important; }
    input.invalid:focus { box-shadow: 0 0 0 3px rgba(240,93,94,.15); }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2L15.5 6V12L9 16L2.5 12V6L9 2Z" fill="#0b0c0f"/>
        </svg>
      </div>
      <span class="logo-text">Nexus</span>
    </div>

    <h1>Bienvenido<br><em>de vuelta.</em></h1>
    <p class="subtitle">Accede a tu cuenta segura</p>

    <!-- Alert area -->
    <div class="alert alert-error" id="alertError" role="alert">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 3.5a.75.75 0 01.75.75v3a.75.75 0 01-1.5 0v-3A.75.75 0 018 4.5zm0 7a.875.875 0 110-1.75.875.875 0 010 1.75z"/></svg>
      <span id="alertErrorMsg">Credenciales inválidas. Inténtalo de nuevo.</span>
    </div>
    <div class="alert alert-success" id="alertSuccess" role="status">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.28 5.28l-4 4a.75.75 0 01-1.06 0l-1.5-1.5a.75.75 0 111.06-1.06l.97.97 3.47-3.47a.75.75 0 111.06 1.06z"/></svg>
      <span>Sesión iniciada correctamente. Redirigiendo…</span>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4zm2-1a1 1 0 00-1 1v.217l5 3.125 5-3.125V4a1 1 0 00-1-1H4zm9 2.383L8.5 8.342 3 5.383V12a1 1 0 001 1h8a1 1 0 001-1V5.383z"/>
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="usuario@dominio.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a3.5 3.5 0 00-3.5 3.5V6H3a1 1 0 00-1 1v7a1 1 0 001 1h10a1 1 0 001-1V7a1 1 0 00-1-1h-1.5V4.5A3.5 3.5 0 008 1zm-2 5V4.5a2 2 0 114 0V6H6zm2 3.5a.75.75 0 01.75.75V12a.75.75 0 01-1.5 0v-1.75A.75.75 0 018 9.5z"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1.5 8s2.5-5 6.5-5 6.5 5 6.5 5-2.5 5-6.5 5S1.5 8 1.5 8zm6.5 3a3 3 0 100-6 3 3 0 000 6zm0-1.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" name="remember" />
          Recordarme
        </label>
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-text">Iniciar sesión</span>
        <span class="spinner"><span class="spin-ring"></span></span>
      </button>
    </form>

    <div class="divider">o</div>
    <div class="register">
      ¿No tienes cuenta? <a href="#">Regístrate gratis</a>
    </div>

    <div class="security-note">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a3.5 3.5 0 00-3.5 3.5V6H3a1 1 0 00-1 1v7a1 1 0 001 1h10a1 1 0 001-1V7a1 1 0 00-1-1h-1.5V4.5A3.5 3.5 0 008 1zm-2 5V4.5a2 2 0 114 0V6H6z"/></svg>
      Conexión cifrada con TLS 1.3 · HTTPS
    </div>

  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────
  const API_URL = 'https://tu-backend.com/api/auth/login'; // 👈 cambia esto
  const REDIRECT_URL = '/dashboard';
  // ────────────────────────────────────────────────────────────────────────

  /* Toggle contraseña visible */
  const togglePw  = document.getElementById('togglePw');
  const pwInput   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');

  const eyeOpen = `<path d="M1.5 8s2.5-5 6.5-5 6.5 5 6.5 5-2.5 5-6.5 5S1.5 8 1.5 8zm6.5 3a3 3 0 100-6 3 3 0 000 6zm0-1.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>`;
  const eyeClosed = `<path d="M13.36 3.22a.75.75 0 011.06 1.06l-11 11a.75.75 0 11-1.06-1.06l1.58-1.58A6.44 6.44 0 011.5 8s2.5-5 6.5-5c1.26 0 2.41.36 3.4.96l1.96-1.74zM8 4.5c-.45 0-.88.07-1.28.2L5.13 6.27A2.5 2.5 0 0110.24 9l-1.58 1.57c.21-.48.34-1 .34-1.57A2.5 2.5 0 008 4.5zm-2.5 2.5a2.5 2.5 0 002.88 2.47L5.5 12a6.44 6.44 0 01-4-4s.52-1.04 1.4-1.97L5.5 7z"/>`;

  togglePw.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    togglePw.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  /* Helpers de UI */
  const alertError   = document.getElementById('alertError');
  const alertErrorMsg= document.getElementById('alertErrorMsg');
  const alertSuccess = document.getElementById('alertSuccess');
  const submitBtn    = document.getElementById('submitBtn');

  function showError(msg) {
    alertError.classList.remove('show');
    alertSuccess.classList.remove('show');
    void alertError.offsetWidth; // reflow para re-trigger animación
    alertErrorMsg.textContent = msg;
    alertError.classList.add('show');
  }

  function showSuccess() {
    alertError.classList.remove('show');
    alertSuccess.classList.add('show');
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.classList.toggle('loading', on);
  }

  function markInvalid(el) {
    el.classList.add('invalid');
    el.addEventListener('input', () => el.classList.remove('invalid'), { once: true });
  }

  /* Validación básica lado cliente */
  function validate(email, password) {
    let ok = true;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(email)) {
      markInvalid(document.getElementById('email'));
      showError('Introduce un correo electrónico válido.');
      ok = false;
    } else if (password.length < 6) {
      markInvalid(document.getElementById('password'));
      showError('La contraseña debe tener al menos 6 caracteres.');
      ok = false;
    }
    return ok;
  }

  /* Envío seguro al backend */
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;

    if (!validate(email, password)) return;

    setLoading(true);
    alertError.classList.remove('show');
    alertSuccess.classList.remove('show');

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          // Añade aquí cabeceras extra si las necesitas:
          // 'X-CSRF-Token': getCookie('csrf_token'),
        },
        credentials: 'include',   // envía cookies HttpOnly si el backend las usa
        body: JSON.stringify({ email, password, remember }),
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        // Guarda el token si el backend lo devuelve en el body
        // (preferir cookies HttpOnly cuando sea posible)
        if (data.token) {
          sessionStorage.setItem('auth_token', data.token);
        }
        showSuccess();
        setTimeout(() => { window.location.href = REDIRECT_URL; }, 1200);
      } else {
        // Muestra el mensaje del servidor o uno genérico
        const msg = data.message || data.error || 'Credenciales incorrectas.';
        showError(msg);
        setLoading(false);
      }

    } catch (err) {
      console.error('Login error:', err);
      showError('No se pudo conectar con el servidor. Comprueba tu conexión.');
      setLoading(false);
    }
  });
</script>
</body>
</html>
